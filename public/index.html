<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskPulse - QA Team Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh}
.login-page{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#1a237e 0%,#0d47a1 100%)}
.login-box{background:white;border-radius:16px;padding:40px;width:350px;box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.login-box h1{color:#1a237e;font-size:1.3em;text-align:center;margin-bottom:5px}
.login-box p{color:#666;text-align:center;font-size:0.85em;margin-bottom:25px}
.login-box input,.login-box select{width:100%;padding:12px;margin-bottom:12px;border:1px solid #ddd;border-radius:8px;font-size:0.95em}
.login-box button{width:100%;padding:12px;background:#1a237e;color:white;border:none;border-radius:8px;font-size:1em;cursor:pointer}
.login-box button:hover{background:#0d47a1}
.login-error{color:#c62828;font-size:0.8em;text-align:center;margin-top:10px;display:none}
.app{display:none}.nav{background:#1a237e;color:white;padding:15px 25px;display:flex;justify-content:space-between;align-items:center}
.nav h2{font-size:1.1em}.nav .user-info{display:flex;align-items:center;gap:12px;font-size:0.9em}
.nav .logout,.nav .profile-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85em}
.deadline-bar{background:#ff5722;color:white;text-align:center;padding:8px;font-size:0.85em;display:none}
.alert-bar{background:#fff3e0;color:#e65100;text-align:center;padding:10px;font-size:0.85em;border-bottom:2px solid #ff9800;display:none}
.main{max-width:1200px;margin:20px auto;padding:0 20px}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:white;border-radius:10px;padding:18px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.stat-card .num{font-size:2em;font-weight:bold;color:#1a237e}.stat-card .lbl{font-size:0.78em;color:#888;margin-top:4px}
.stat-card.alert .num{color:#e65100}.stat-card.alert{border:2px solid #ff9800}
.section{background:white;border-radius:10px;padding:22px;margin-bottom:18px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.section h3{color:#1a237e;font-size:1em;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e8eaf6}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-grid.five{grid-template-columns:1fr 0.7fr 0.7fr 1fr 1fr}
label{font-size:0.8em;color:#555;display:block;margin-bottom:4px;font-weight:500}
select,input,textarea{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:6px;font-size:0.88em}
textarea{min-height:70px;resize:vertical}.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:0.85em;font-weight:500}
.btn-primary{background:#1a237e;color:white}.btn-green{background:#2e7d32;color:white}
.btn-orange{background:#e65100;color:white}.btn-sm{padding:4px 10px;font-size:0.75em}.btn:hover{opacity:0.9}
.btn-row{display:flex;gap:8px;margin-top:12px}
table{width:100%;border-collapse:collapse;font-size:0.82em;margin-top:10px}
th{background:#1a237e;color:white;padding:9px 7px;text-align:left}td{padding:7px;border-bottom:1px solid #eee}
tr.highlight-pending td{background:#fff3e0!important}tr.highlight-blocked td{background:#fce4ec!important}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.75em}
.badge-norton{background:#e8eaf6;color:#1a237e}.badge-iom{background:#e8f5e9;color:#2e7d32}.badge-digi{background:#fff3e0;color:#e65100}
.badge-done{background:#e8f5e9;color:#2e7d32}.badge-progress{background:#fff3e0;color:#e65100;font-weight:bold}.badge-blocked{background:#fce4ec;color:#c62828;font-weight:bold}
.member-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.member-card{border-radius:8px;padding:14px;border:1px solid #eee}
.member-card.submitted{border-left:4px solid #2e7d32}.member-card.pending{border-left:4px solid #ff5722}
.member-card h4{font-size:0.9em;margin-bottom:4px}.member-card .hours{font-size:1.4em;font-weight:bold;color:#1a237e}
.member-card .projects{font-size:0.75em;color:#666;margin-top:4px}.member-card .pending-alert{font-size:0.7em;color:#e65100;margin-top:4px;font-weight:bold}
.no-data{text-align:center;padding:25px;color:#999}.del-btn{color:#c62828;cursor:pointer}
.review-note{background:#e3f2fd;border-left:3px solid #1a237e;padding:4px 8px;margin-top:4px;font-size:0.75em;border-radius:4px}
.review-note .rn-by{color:#1a237e;font-weight:bold}.review-note .rn-time{color:#999}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center}
.modal{background:white;border-radius:12px;padding:30px;width:400px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.modal h3{color:#1a237e;margin-bottom:15px}.modal input,.modal textarea{margin-bottom:10px}
@media(max-width:768px){.form-grid,.stats-row,.member-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="login-page" id="loginPage"><div class="login-box"><h1>TaskPulse</h1><p>CPShopBuy QA - Daily Task Tracker</p><select id="loginName"><option value="">Select your name</option><option value="Jothipriya">Jothipriya</option><option value="Vimala">Vimala</option><option value="Sureshrajendran">Sureshrajendran</option><option value="Talent">Talent</option><option disabled>--------------</option><option value="Thillai">Thillai</option><option value="Sureshkannan">Sureshkannan</option><option value="Nivedhitha">Nivedhitha</option></select><input type="password" id="loginPass" placeholder="Password"><button onclick="login()">Login</button><div class="login-error" id="loginError">Invalid credentials</div></div></div>
<div class="modal-overlay" id="profileModal"><div class="modal"><h3>Edit Profile</h3><label>Name</label><input type="text" id="profileName" disabled><label>Current Password</label><input type="password" id="oldPass"><label>New Password</label><input type="password" id="newPass"><label>Confirm</label><input type="password" id="confirmPass"><div class="btn-row"><button class="btn btn-primary" onclick="changePassword()">Save</button><button class="btn btn-orange" onclick="closeProfile()">Cancel</button></div></div></div>
<div class="modal-overlay" id="reviewModal"><div class="modal"><h3>Add Review Note</h3><p style="font-size:0.85em;color:#666;margin-bottom:10px" id="reviewTaskInfo"></p><label>Your Feedback</label><textarea id="reviewText" placeholder="Add your review, suggestion, or feedback..." style="min-height:100px"></textarea><div class="btn-row"><button class="btn btn-primary" onclick="submitReview()">Add Note</button><button class="btn btn-orange" onclick="closeReview()">Cancel</button></div></div></div>
<div class="app" id="appPage">
<div class="nav"><h2>TaskPulse</h2><div class="user-info"><span id="navUser"></span><button class="profile-btn" onclick="openProfile()">Profile</button><button class="logout" onclick="logout()">Logout</button></div></div>
<div class="deadline-bar" id="deadlineBar">Submit before 5:40 PM</div>
<div class="alert-bar" id="alertBar"><span id="alertText"></span></div>
<div class="main">
<div class="stats-row"><div class="stat-card"><div class="num" id="sEntries">0</div><div class="lbl">Today's Entries</div></div><div class="stat-card"><div class="num" id="sHours">0</div><div class="lbl">Total Hours</div></div><div class="stat-card"><div class="num" id="sMembers">4</div><div class="lbl">Team Size</div></div><div class="stat-card"><div class="num" id="sPending">0</div><div class="lbl">Not Submitted</div></div><div class="stat-card alert"><div class="num" id="sPendingTasks">0</div><div class="lbl">Pending Tasks</div></div></div>
<div class="section" id="memberStatusSection" style="display:none"><h3>Team Status</h3><div class="member-grid" id="memberGrid"></div></div>
<div class="section" id="entryFormSection"><h3>Add Task</h3>
<div class="form-grid five">
<div><label>Project *</label><select id="fProject"></select></div>
<div><label>Hours *</label><select id="fHours"><option value="0">0h</option><option value="1">1h</option><option value="2">2h</option><option value="3">3h</option><option value="4">4h</option><option value="5">5h</option><option value="6">6h</option><option value="7">7h</option><option value="8">8h</option><option value="9">9h</option></select></div>
<div><label>Minutes</label><select id="fMinutes"><option value="0">00m</option><option value="5">05m</option><option value="10">10m</option><option value="15">15m</option><option value="20">20m</option><option value="25">25m</option><option value="30">30m</option><option value="35">35m</option><option value="40">40m</option><option value="45">45m</option><option value="50">50m</option><option value="55">55m</option><option value="60">60m</option></select></div>
<div><label>Start Date</label><input type="date" id="fStartDate"></div>
<div><label>End Date</label><input type="date" id="fEndDate"></div>
</div>
<div class="form-grid"><div><label>Status</label><select id="fStatus"><option>In Progress</option><option>Completed</option><option>Blocked</option><option>In Review</option></select></div><div><label>Jira Ticket</label><input type="text" id="fJira" placeholder="CB01-8644"></div><div><label>Notes</label><input type="text" id="fNotes" placeholder="Blockers?"></div></div>
<div><label>Task Details *</label><textarea id="fTask" placeholder="What did you work on?"></textarea></div>
<div class="btn-row"><button class="btn btn-primary" onclick="submitEntry()">Save</button><button class="btn btn-green" onclick="clearForm()">Another</button></div>
</div>
<div class="section" id="myEntriesSection"><h3>My Entries</h3><div id="myEntries"></div></div>
<div class="section" id="allEntriesSection" style="display:none"><h3>All Entries</h3><div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center"><select id="filtMember" onchange="loadAllEntries()"><option value="">All Members</option></select><select id="filtProject" onchange="loadAllEntries()"><option value="">All Projects</option></select><select id="filtStatus" onchange="loadAllEntries()"><option value="">All Status</option><option>In Progress</option><option>Completed</option><option>Blocked</option></select><label style="font-size:0.8em;margin:0">From:</label><input type="date" id="filtFromDate" onchange="loadAllEntries()" style="width:130px"><label style="font-size:0.8em;margin:0">To:</label><input type="date" id="filtToDate" onchange="loadAllEntries()" style="width:130px"><button class="btn btn-primary" onclick="setDateRange('today')">Today</button><button class="btn btn-green" onclick="setDateRange('week')">Week</button><button class="btn btn-orange" onclick="exportCSV()">CSV</button><button class="btn btn-green" onclick="genEmail()">Email</button></div><div id="allEntries"></div></div>
</div></div>
<script>
let currentUser=null,reviewEntryId=null;
function getHours(){const h=parseInt(document.getElementById('fHours').value)||0;const m=parseInt(document.getElementById('fMinutes').value)||0;return h+(m/60)}
function formatHours(h){const hrs=Math.floor(h);const mins=Math.round((h-hrs)*60);if(mins===0)return hrs+'h';if(hrs===0)return mins+'m';return hrs+'h '+mins+'m'}
async function login(){const n=document.getElementById('loginName').value,p=document.getElementById('loginPass').value;const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,password:p})});const d=await r.json();if(d.success){currentUser=d.user;document.getElementById('loginPage').style.display='none';document.getElementById('appPage').style.display='block';document.getElementById('navUser').textContent=currentUser.name;initApp()}else document.getElementById('loginError').style.display='block'}
function logout(){location.reload()}
function openProfile(){document.getElementById('profileModal').style.display='flex';document.getElementById('profileName').value=currentUser.name}
function closeProfile(){document.getElementById('profileModal').style.display='none'}
async function changePassword(){const o=document.getElementById('oldPass').value,n=document.getElementById('newPass').value,c=document.getElementById('confirmPass').value;if(!o||!n)return alert('Fill all fields');if(n!==c)return alert('Passwords do not match');const r=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:currentUser.name,oldPassword:o,newPassword:n})});const d=await r.json();alert(d.success?'Changed!':'Error: '+d.message);if(d.success)closeProfile()}
function openReview(id,task,member){reviewEntryId=id;document.getElementById('reviewModal').style.display='flex';document.getElementById('reviewTaskInfo').textContent=member+': '+task;document.getElementById('reviewText').value=''}
function closeReview(){document.getElementById('reviewModal').style.display='none'}
async function submitReview(){const t=document.getElementById('reviewText').value.trim();if(!t)return alert('Enter note');const r=await fetch('/api/entries/'+reviewEntryId+'/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({by:currentUser.name,text:t,role:currentUser.role})});const d=await r.json();if(d.success){alert('Added!');closeReview();loadAllEntries()}else alert('Error: '+d.message)}
function renderNotes(notes){if(!notes||!notes.length)return '';return notes.map(n=>'<div class="review-note"><span class="rn-by">'+n.by+':</span> '+n.text+' <span class="rn-time">('+n.time+')</span></div>').join('')}
function setDateRange(r){const t=new Date();if(r==='today'){document.getElementById('filtFromDate').value=t.toISOString().split('T')[0];document.getElementById('filtToDate').value=t.toISOString().split('T')[0]}else{const w=new Date(t);w.setDate(t.getDate()-t.getDay()+1);document.getElementById('filtFromDate').value=w.toISOString().split('T')[0];document.getElementById('filtToDate').value=t.toISOString().split('T')[0]}loadAllEntries()}
function initApp(){document.getElementById('fProject').innerHTML='<option value="">Select</option>'+currentUser.projects.map(p=>'<option>'+p+'</option>').join('');document.getElementById('fStartDate').value=new Date().toISOString().split('T')[0];document.getElementById('fEndDate').value=new Date().toISOString().split('T')[0];if(currentUser.role==='lead'||currentUser.role==='manager'){document.getElementById('memberStatusSection').style.display='block';document.getElementById('allEntriesSection').style.display='block';document.getElementById('filtMember').innerHTML='<option value="">All</option><option>Jothipriya</option><option>Vimala</option><option>Sureshrajendran</option><option>Talent</option>';document.getElementById('filtProject').innerHTML='<option value="">All</option><option>Norton Phase 2</option><option>IOM</option><option>RFC Migration</option><option>Digi App</option><option>DMS Automation</option><option>EMS Automation</option><option>Learning</option>';setDateRange('today')}if(currentUser.role==='manager'){document.getElementById('entryFormSection').style.display='none';document.getElementById('myEntriesSection').style.display='none'}loadStats();if(currentUser.role!=='manager')loadMyEntries();setInterval(()=>{const h=new Date().getHours();document.getElementById('deadlineBar').style.display=h>=17?'block':'none'},60000)}
async function loadStats(){const r=await fetch('/api/stats');const s=await r.json();document.getElementById('sEntries').textContent=s.totalEntries;document.getElementById('sHours').textContent=s.totalHours;document.getElementById('sPending').textContent=s.pending;document.getElementById('sPendingTasks').textContent=s.totalPendingTasks||0;if(s.totalPendingTasks>0){document.getElementById('alertBar').style.display='block';document.getElementById('alertText').textContent=s.totalPendingTasks+' task(s) In Progress/Blocked'}else document.getElementById('alertBar').style.display='none';if(currentUser.role==='lead'||currentUser.role==='manager')document.getElementById('memberGrid').innerHTML=s.memberStats.map(m=>'<div class="member-card '+(m.submitted?'submitted':'pending')+'"><h4>'+(m.submitted?'[OK]':'[!]')+' '+m.name+'</h4><div class="hours">'+formatHours(m.hours)+'</div><div class="projects">'+(m.projects.join(', ')||'No update')+'</div>'+(m.pendingCount?'<div class="pending-alert">'+m.pendingCount+' pending</div>':'')+'</div>').join('')}
async function loadMyEntries(){const today=new Date().toISOString().split('T')[0];const r=await fetch('/api/entries?date='+today+'&member='+currentUser.name);const entries=await r.json();const el=document.getElementById('myEntries');if(!entries.length){el.innerHTML='<div class="no-data">No entries today</div>';return}el.innerHTML='<table><thead><tr><th>Project</th><th>Time</th><th>Task</th><th>Status</th><th>Logged</th><th></th></tr></thead><tbody>'+entries.map(e=>'<tr class="'+(e.status==='Blocked'?'highlight-blocked':e.status==='In Progress'?'highlight-pending':'')+'"><td><span class="badge badge-'+badgeFor(e.project)+'">'+e.project+'</span></td><td><strong>'+formatHours(e.hours)+'</strong></td><td>'+e.task+renderNotes(e.reviewNotes)+'</td><td><span class="badge badge-'+statusBadge(e.status)+'">'+e.status+'</span></td><td>'+e.time+'</td><td><span class="del-btn" onclick="delEntry('+e.id+')">X</span></td></tr>').join('')+'</tbody></table>'}
async function loadAllEntries(){const fd=document.getElementById('filtFromDate').value,td=document.getElementById('filtToDate').value,m=document.getElementById('filtMember').value,p=document.getElementById('filtProject').value,st=document.getElementById('filtStatus').value;let u='/api/entries?';if(fd)u+='fromDate='+fd+'&';if(td)u+='toDate='+td+'&';if(m)u+='member='+m+'&';if(p)u+='project='+p+'&';if(st)u+='status='+st+'&';const r=await fetch(u);const entries=await r.json();const el=document.getElementById('allEntries');if(!entries.length){el.innerHTML='<div class="no-data">No entries</div>';return}const cr=currentUser.role==='manager'||currentUser.role==='lead';const tot=entries.reduce((s,e)=>s+(e.hours||0),0);el.innerHTML='<p style="font-size:0.85em;color:#666;margin-bottom:8px">'+entries.length+' entries | '+formatHours(tot)+' total</p><table><thead><tr><th>Date</th><th>Member</th><th>Project</th><th>Time</th><th>Task & Notes</th><th>Status</th>'+(cr?'<th></th>':'')+'</tr></thead><tbody>'+entries.map(e=>'<tr class="'+(e.status==='Blocked'?'highlight-blocked':e.status==='In Progress'?'highlight-pending':'')+'"><td>'+e.date+'</td><td><strong>'+e.member+'</strong></td><td><span class="badge badge-'+badgeFor(e.project)+'">'+e.project+'</span></td><td>'+formatHours(e.hours)+'</td><td>'+e.task+renderNotes(e.reviewNotes)+'</td><td><span class="badge badge-'+statusBadge(e.status)+'">'+e.status+'</span></td>'+(cr?'<td><button class="btn btn-sm btn-primary" onclick="openReview('+e.id+',\''+e.task.substring(0,25).replace(/[^a-zA-Z0-9 ]/g,'')+'\',\''+e.member+'\')">Review</button></td>':'')+'</tr>').join('')+'</tbody></table>'}
async function submitEntry(){const pr=document.getElementById('fProject').value,hr=getHours(),tk=document.getElementById('fTask').value.trim(),ji=document.getElementById('fJira').value.trim(),st=document.getElementById('fStatus').value,nt=document.getElementById('fNotes').value.trim(),sd=document.getElementById('fStartDate').value,ed=document.getElementById('fEndDate').value;if(!pr||(!hr&&!parseInt(document.getElementById('fMinutes').value))||!tk)return alert('Fill Project, Hours/Minutes, and Task');await fetch('/api/entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({member:currentUser.name,project:pr,hours:hr,task:tk,jira:ji,status:st,notes:nt,startDate:sd,endDate:ed})});clearForm();loadMyEntries();loadStats();if(currentUser.role==='lead')loadAllEntries();alert('Saved: '+pr+' - '+formatHours(hr))}
async function delEntry(id){if(!confirm('Delete?'))return;await fetch('/api/entries/'+id,{method:'DELETE'});loadMyEntries();loadStats();if(currentUser.role==='lead')loadAllEntries()}
function clearForm(){document.getElementById('fTask').value='';document.getElementById('fJira').value='';document.getElementById('fHours').value='1';document.getElementById('fMinutes').value='0';document.getElementById('fNotes').value='';document.getElementById('fProject').value='';document.getElementById('fStartDate').value=new Date().toISOString().split('T')[0];document.getElementById('fEndDate').value=new Date().toISOString().split('T')[0]}
async function exportCSV(){const fd=document.getElementById('filtFromDate').value,td=document.getElementById('filtToDate').value;const r=await fetch('/api/entries?fromDate='+fd+'&toDate='+td);const e=await r.json();let c='Date,Member,Project,Hours,Task,Status,StartDate,EndDate,ReviewNotes\n';e.forEach(x=>{const rn=(x.reviewNotes||[]).map(n=>n.by+': '+n.text).join(' | ');c+=x.date+',"'+x.member+'","'+x.project+'",'+x.hours+',"'+x.task+'","'+x.status+'","'+(x.startDate||'')+'","'+(x.endDate||'')+'","'+rn+'"\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c]));a.download='QA_Tracker_'+fd+'.csv';a.click()}
async function genEmail(){const fd=document.getElementById('filtFromDate').value;const r=await fetch('/api/email-report?date='+fd);const d=await r.json();await navigator.clipboard.writeText(d.email);alert('Email copied to clipboard!')}
function badgeFor(p){return p.includes('Norton')?'norton':p.includes('IOM')?'iom':'digi'}
function statusBadge(s){return s==='Completed'?'done':s==='Blocked'?'blocked':'progress'}
</script>
</body>
</html>
